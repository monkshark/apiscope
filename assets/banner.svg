<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.42" stop-color="#3f37c9"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glowWhite" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSky" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#56a8ff" stop-opacity="0.45"/>
      <stop offset="0.62" stop-color="#56a8ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.3" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lensFill" cx="0.34" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="0.55" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.05"/>
    </radialGradient>
    <pattern id="dots" width="27" height="27" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" fill-opacity="0.07"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="30" stdDeviation="22" flood-color="#08040f" flood-opacity="0.7"/>
    </filter>
    <clipPath id="clipA"><rect x="46" y="72" width="250" height="192" rx="15"/></clipPath>
    <clipPath id="clipB"><rect x="250" y="158" width="322" height="158" rx="15"/></clipPath>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>
  <circle cx="130" cy="50" r="270" fill="url(#glowWhite)" filter="url(#soft)"/>
  <circle cx="1080" cy="400" r="240" fill="url(#glowSky)" filter="url(#soft)"/>
  <rect width="1200" height="400" fill="url(#dots)"/>
  <rect width="1200" height="400" fill="url(#topLight)"/>

  <g transform="rotate(-5 171 168)" filter="url(#cardShadow)">
    <rect x="46" y="72" width="250" height="192" rx="15" fill="#0d1117" stroke="#30363d"/>
    <g clip-path="url(#clipA)">
      <line x1="46" y1="112" x2="296" y2="112" stroke="#21262d"/>
      <rect x="59" y="83" width="18" height="18" rx="6" fill="#6366f1"/>
      <circle cx="67" cy="91" r="3.6" fill="none" stroke="#ffffff" stroke-width="2"/>
      <line x1="70" y1="94" x2="73.5" y2="97.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      <text x="86" y="97" fill="#e6edf3" font-size="12" font-weight="600">APIScope</text>
      <text x="283" y="97" fill="#8b949e" font-size="11" text-anchor="end">&#9662;</text>

      <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10.5">
        <rect x="59" y="126" width="34" height="15" rx="4" fill="#388bfd" fill-opacity="0.18"/>
        <text x="76" y="137" fill="#79c0ff" font-size="9" text-anchor="middle">GET</text>
        <text x="100" y="137" fill="#3fb950">200</text>
        <text x="126" y="137" fill="#adbac7">/api/users</text>
        <text x="288" y="137" fill="#6e7681" font-size="9" text-anchor="end">31ms</text>

        <rect x="59" y="150" width="34" height="15" rx="4" fill="#3fb950" fill-opacity="0.18"/>
        <text x="76" y="161" fill="#3fb950" font-size="9" text-anchor="middle">POST</text>
        <text x="100" y="161" fill="#d29922">403</text>
        <text x="126" y="161" fill="#adbac7">/api/login</text>
        <text x="288" y="161" fill="#6e7681" font-size="9" text-anchor="end">88ms</text>

        <rect x="59" y="174" width="34" height="15" rx="4" fill="#388bfd" fill-opacity="0.18"/>
        <text x="76" y="185" fill="#79c0ff" font-size="9" text-anchor="middle">GET</text>
        <text x="100" y="185" fill="#3fb950">200</text>
        <text x="126" y="185" fill="#adbac7">/api/orders</text>
        <text x="288" y="185" fill="#6e7681" font-size="9" text-anchor="end">24ms</text>

        <rect x="59" y="198" width="34" height="15" rx="4" fill="#388bfd" fill-opacity="0.18"/>
        <text x="76" y="209" fill="#79c0ff" font-size="9" text-anchor="middle">GET</text>
        <text x="100" y="209" fill="#79c0ff">304</text>
        <text x="126" y="209" fill="#adbac7">/api/me</text>
        <text x="288" y="209" fill="#6e7681" font-size="9" text-anchor="end">12ms</text>
      </g>

      <rect x="53" y="223" width="240" height="23" rx="6" fill="#6366f1" fill-opacity="0.13"/>
      <path d="M62 233 v-2.4 a3 3 0 0 1 6 0 v2.4" fill="none" stroke="#8b949e" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="60" y="233" width="10" height="8" rx="2" fill="#8b949e"/>
      <text x="78" y="239" fill="#8b949e" font-size="10" font-family="'JetBrains Mono', ui-monospace, monospace">Authorization: Bearer &#8226;&#8226;&#8226;&#8226;</text>
    </g>
  </g>

  <g transform="rotate(4 411 237)" filter="url(#cardShadow)">
    <rect x="250" y="158" width="322" height="158" rx="15" fill="#0d1117" stroke="#30363d"/>
    <g clip-path="url(#clipB)">
      <rect x="250" y="158" width="322" height="34" fill="#161b22"/>
      <line x1="250" y1="192" x2="572" y2="192" stroke="#30363d"/>
      <circle cx="266" cy="175" r="4.5" fill="#ff5f57"/>
      <circle cx="279" cy="175" r="4.5" fill="#febc2e"/>
      <circle cx="292" cy="175" r="4.5" fill="#28c840"/>
      <text x="306" y="179" fill="#8b949e" font-size="11" font-family="'JetBrains Mono', ui-monospace, monospace">response &#183; 200 OK</text>

      <rect x="251" y="237" width="320" height="20" fill="#6366f1" fill-opacity="0.12"/>
      <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11.5">
        <text x="268" y="212" fill="#8b949e">{</text>
        <text x="282" y="232"><tspan fill="#79c0ff">"id"</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#f0b72f">42</tspan><tspan fill="#8b949e">,</tspan></text>
        <text x="282" y="252"><tspan fill="#79c0ff">"email"</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#7ee787">"</tspan><tspan fill="#8b949e">&#8226;&#8226;&#8226;@&#8226;&#8226;&#8226;</tspan><tspan fill="#7ee787">"</tspan><tspan fill="#8b949e">,</tspan></text>
        <text x="282" y="272"><tspan fill="#79c0ff">"role"</tspan><tspan fill="#8b949e">: </tspan><tspan fill="#7ee787">"admin"</tspan></text>
        <text x="268" y="292" fill="#8b949e">}</text>
      </g>
    </g>
  </g>

  <g>
    <rect x="442" y="160" width="28" height="84" rx="14" fill="#ffffff" fill-opacity="0.94" transform="rotate(-45 456 160)"/>
    <circle cx="414" cy="128" r="70" fill="url(#lensFill)" stroke="#ffffff" stroke-width="9" stroke-opacity="0.95"/>
    <ellipse cx="384" cy="102" rx="24" ry="13" fill="#ffffff" fill-opacity="0.5" filter="url(#soft)"/>
    <text x="414" y="124" fill="#dad7ff" font-size="20" font-weight="600" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">{ }</text>
    <text x="414" y="148" fill="#3fb950" font-size="14" font-weight="500" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace">200 OK</text>
  </g>

  <g>
    <rect x="650" y="92" width="186" height="26" rx="13" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.28"/>
    <circle cx="666" cy="105" r="3" fill="#3fb950"/>
    <circle cx="666" cy="105" r="6" fill="#3fb950" fill-opacity="0.4" filter="url(#soft)"/>
    <text x="678" y="109" fill="#ffffff" font-size="11.5" font-weight="500" letter-spacing="0.3">Chrome DevTools Extension</text>

    <rect x="650" y="132" width="52" height="52" rx="14" fill="#ffffff" fill-opacity="0.96"/>
    <g fill="#4f46e5">
      <rect x="662" y="146" width="20" height="3" rx="1.5" fill-opacity="0.3"/>
      <rect x="662" y="152" width="14" height="3" rx="1.5" fill-opacity="0.3"/>
    </g>
    <circle cx="673" cy="156" r="10.5" fill="none" stroke="#4f46e5" stroke-width="4"/>
    <line x1="681" y1="164" x2="691" y2="174" stroke="#4f46e5" stroke-width="5" stroke-linecap="round"/>
    <text x="716" y="173" fill="#ffffff" font-size="44" font-weight="800" letter-spacing="-1.5">APIScope</text>

    <text x="650" y="222" fill="#ffffff" fill-opacity="0.86" font-size="19">Capture, mask, and convert API calls into cURL &#8212;</text>
    <text x="650" y="248" fill="#ffffff" fill-opacity="0.86" font-size="19">then replay, fuzz, and intercept them in DevTools.</text>

    <g font-size="12.5" font-weight="500">
      <rect x="650" y="272" width="138" height="28" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="719" y="290" fill="#ffffff" text-anchor="middle">Capture &amp; search</text>
      <rect x="798" y="272" width="110" height="28" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="853" y="290" fill="#ffffff" text-anchor="middle">Mask secrets</text>
      <rect x="918" y="272" width="86" height="28" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="961" y="290" fill="#ffffff" text-anchor="middle">Convert</text>

      <rect x="650" y="310" width="120" height="28" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="710" y="328" fill="#ffffff" text-anchor="middle">Replay &amp; fuzz</text>
      <rect x="780" y="310" width="152" height="28" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="856" y="328" fill="#ffffff" text-anchor="middle">Tamper &amp; intercept</text>
      <rect x="942" y="310" width="80" height="28" rx="8" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.18"/>
      <text x="982" y="328" fill="#ffffff" text-anchor="middle">Decode</text>
    </g>
  </g>
</svg>
