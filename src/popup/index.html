<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APIScope</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --tx: #1f2328;
        --mut: #656d76;
        --bd: #d0d7de;
        --row: #ffffff;
        --acc: #4f46e5;
        --acc-bg: #f6f5ff;
        --chip: #f6f8fa;
        --dec-bg: #ffffff;
        --dec-bd: #c7c3f5;
        --view-bg: #eaeef2;
        --view-hov: #656d76;
        --amb: #9a6700;
        --amb-bg: #fdf3da;
        --amb-bd: #f0d99a;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --tx: #e6edf3;
          --mut: #8b949e;
          --bd: #30363d;
          --row: #161b22;
          --acc: #6366f1;
          --acc-bg: #181a2e;
          --chip: #161b22;
          --dec-bg: #21262d;
          --dec-bd: transparent;
          --view-bg: #21262d;
          --view-hov: #6e7681;
          --amb: #d29922;
          --amb-bg: #2b2410;
          --amb-bd: #4a3a14;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 300px;
        padding: 12px;
        background: var(--bg);
        color: var(--tx);
        font-family: 'Inter', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
      }
      .head {
        display: flex;
        align-items: center;
        gap: 9px;
        padding-bottom: 10px;
      }
      .glyph {
        width: 24px;
        height: 24px;
        border-radius: 7px;
        background: var(--acc);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .title {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .ver {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 11px;
        color: var(--mut);
        margin-left: auto;
      }
      .divider {
        height: 1px;
        background: var(--bd);
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px 0 0;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--bd);
        background: var(--row);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.12s;
        text-align: left;
        color: inherit;
        font: inherit;
        width: 100%;
      }
      .row:hover {
        border-color: var(--acc);
        background: var(--acc-bg);
        transform: translateY(-1px);
      }
      .row:active {
        transform: translateY(0);
      }
      .tile {
        width: 30px;
        height: 30px;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.12s;
      }
      .tile svg {
        display: block;
      }
      .tile.dec {
        background: var(--dec-bg);
        border: 1px solid var(--dec-bd);
        color: var(--acc);
      }
      .row:hover .tile.dec {
        background: var(--acc);
        border-color: var(--acc);
        color: #ffffff;
      }
      .tile.view {
        background: var(--view-bg);
        color: var(--mut);
      }
      .row:hover .tile.view {
        background: var(--view-hov);
        color: #ffffff;
      }
      .tile.int {
        background: var(--amb-bg);
        color: var(--amb);
      }
      .row:hover .tile.int {
        background: var(--amb);
        color: #ffffff;
      }
      .body {
        min-width: 0;
        flex: 1;
      }
      .name {
        font-size: 12.5px;
        font-weight: 500;
        line-height: 1.3;
      }
      .name-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .desc {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 10.5px;
        color: var(--mut);
        line-height: 1.35;
        margin-top: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pill {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 9px;
        color: var(--amb);
        background: var(--amb-bg);
        border: 1px solid var(--amb-bd);
        border-radius: 5px;
        padding: 1px 5px;
        letter-spacing: 0.02em;
      }
      .chev {
        flex-shrink: 0;
        color: var(--mut);
        transition: color 0.12s;
      }
      .row:hover .chev {
        color: var(--acc);
      }
      .upd {
        display: none;
        align-items: center;
        gap: 8px;
        padding-top: 9px;
      }
      .upd-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--acc);
        flex-shrink: 0;
      }
      .upd-tx {
        font-size: 10.5px;
        color: var(--tx);
        line-height: 1.4;
        flex: 1;
      }
      .upd-ver {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        color: var(--acc);
      }
      .upd-link {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 10px;
        color: var(--acc);
        cursor: pointer;
        flex-shrink: 0;
        background: none;
        border: none;
        padding: 0;
      }
      .foot {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-top: 9px;
      }
      .foot-tx {
        font-size: 10.5px;
        color: var(--mut);
        line-height: 1.4;
        flex: 1;
      }
      .kbd {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 10px;
        color: var(--mut);
        background: var(--chip);
        border: 1px solid var(--bd);
        border-radius: 6px;
        padding: 2px 6px;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="head">
      <div class="glyph">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="3.6" stroke="#fff" stroke-width="1.5" />
          <line x1="9.4" y1="9.4" x2="13" y2="13" stroke="#fff" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>
      <div class="title">APIScope</div>
      <div class="ver" id="version">v1.2.0</div>
    </div>
    <div class="divider"></div>
    <div class="rows">
      <button class="row" id="decoder">
        <div class="tile dec">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="3.8" stroke="currentColor" stroke-width="1.6" />
            <line x1="9.6" y1="9.6" x2="13.2" y2="13.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          </svg>
        </div>
        <div class="body">
          <div class="name">Open decoder</div>
          <div class="desc">JWT · Base64 · URL · Hex · UUID · timestamp</div>
        </div>
        <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <button class="row" id="viewer">
        <div class="tile view">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M4 2.5h5L12 5.5V13a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1z" stroke="currentColor" stroke-width="1.3" />
            <path d="M9 2.5V5.5h3" stroke="currentColor" stroke-width="1.3" />
            <line x1="5" y1="8.2" x2="10" y2="8.2" stroke="currentColor" stroke-width="1.1" />
            <line x1="5" y1="10.4" x2="10" y2="10.4" stroke="currentColor" stroke-width="1.1" />
          </svg>
        </div>
        <div class="body">
          <div class="name">Open viewer</div>
          <div class="desc">Import a HAR or session JSON, read-only</div>
        </div>
        <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <button class="row" id="intercept">
        <div class="tile int">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="4" y="3" width="2.6" height="10" rx="0.6" fill="currentColor" />
            <rect x="9.4" y="3" width="2.6" height="10" rx="0.6" fill="currentColor" />
          </svg>
        </div>
        <div class="body">
          <div class="name-row">
            <div class="name">Open interceptor</div>
            <span class="pill">debugger</span>
          </div>
          <div class="desc">Burp-style pause, edit, forward</div>
        </div>
        <svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>
    <div class="divider" style="margin: 12px 0 0;"></div>
    <div class="upd" id="update">
      <span class="upd-dot"></span>
      <div class="upd-tx">
        Version <span class="upd-ver" id="update-version">1.2.0</span> available
      </div>
      <button class="upd-link" id="update-link">update</button>
    </div>
    <div class="foot">
      <div class="foot-tx">Live capture lives in the DevTools panel (F12).</div>
      <span class="kbd">Alt+Shift+D</span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
